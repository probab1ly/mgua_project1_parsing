<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Вход · AI Regulation Monitor</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#f8f5f0;
  --bg-dark:#f2eee6;
  --accent:#8b1a1a;
  --accent-hover:#6d1414;
  --text:#18181b;
  --text-muted:#52525b;
  --border:#e4e4e7;
  --card:#ffffff;
  --danger:#b91c1c;
  --shadow:0 4px 20px rgba(0,0,0,.06);
}
*{box-sizing:border-box;margin:0;padding:0}
body{
  min-height:100vh;
  font-family:'Inter',sans-serif;
  color:var(--text);
  background:var(--bg);
  display:grid;
  place-items:center;
  padding:2rem;
}
.login-card{
  width:min(420px,100%);
  background:var(--card);
  border:1px solid var(--border);
  border-top:5px solid var(--accent);
  border-radius:12px;
  box-shadow:var(--shadow);
  padding:2rem;
}
.brand{display:flex;align-items:center;gap:1rem;margin-bottom:1.5rem}
.brand img{width:64px;height:auto}
.brand h1{font-size:1.25rem;line-height:1.15;color:var(--accent);font-weight:800}
.brand span{display:block;margin-top:.25rem;font-size:.78rem;color:var(--text-muted);font-weight:600;text-transform:uppercase;letter-spacing:.08em}
.field{display:flex;flex-direction:column;gap:.45rem;margin-bottom:1rem}
label{font-size:.82rem;font-weight:700;color:var(--text-muted)}
input{
  width:100%;
  border:1px solid var(--border);
  border-radius:8px;
  padding:.8rem .9rem;
  font:inherit;
  outline:none;
}
input:focus{border-color:var(--accent);box-shadow:0 0 0 4px rgba(139,26,26,.1)}
.error{
  background:rgba(185,28,28,.08);
  color:var(--danger);
  border:1px solid rgba(185,28,28,.18);
  border-radius:8px;
  padding:.75rem .9rem;
  font-size:.86rem;
  margin-bottom:1rem;
}
button{
  width:100%;
  border:none;
  border-radius:8px;
  background:var(--accent);
  color:#fff;
  padding:.85rem 1rem;
  font:inherit;
  font-weight:800;
  cursor:pointer;
}
button:hover{background:var(--accent-hover)}
.note{margin-top:1rem;color:var(--text-muted);font-size:.78rem;line-height:1.5}
</style>
</head>
<body>
  <form class="login-card" method="post">
    <div class="brand">
      <img src="/static/logo.png" alt="МГЮА">
      <div>
        <h1>AI Regulation Monitor</h1>
        <span>Закрытый доступ</span>
      </div>
    </div>
    {% if error %}
      <div class="error">{{ error }}</div>
    {% endif %}
    <div class="field">
      <label for="username">Логин</label>
      <input id="username" name="username" autocomplete="username" required autofocus>
    </div>
    <div class="field">
      <label for="password">Пароль</label>
      <input id="password" name="password" type="password" autocomplete="current-password" required>
    </div>
    <button type="submit">Войти</button>
    <p class="note">Регистрация отключена. Доступ выдается только сотрудникам, которым переданы учетные данные.</p>
  </form>
</body>
</html>
